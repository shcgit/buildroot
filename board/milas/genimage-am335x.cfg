image boot.vfat {
	vfat {
		label="BOOT"
		extraargs = "-F 32 -a"

		file MLO {
			image = "barebox-am33xx-myirtech-mlo.img"
		}

		file barebox.bin {
			image = "barebox-am33xx-myirtech.img"
		}

		files = {
			"barebox.env",
			"rootfs.squashfs",
			"zImage"
		}
	}

	size = 128M
}

image mm-am335x-sdcard.img {
	hdimage {
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
		offset = 1M
	}
}
